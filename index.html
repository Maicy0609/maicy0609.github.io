<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Maicy0609 - 项目主页</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { 
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
            line-height: 1.6; 
            color: #24292e;
            background: #f6f8fa;
        }
        .container { 
            max-width: 1012px; 
            margin: 0 auto; 
            padding: 32px 16px; 
        }
        header { 
            text-align: center; 
            padding: 40px 0; 
            border-bottom: 1px solid #e1e4e8;
            margin-bottom: 32px;
        }
        h1 { font-size: 32px; font-weight: 600; margin-bottom: 8px; }
        .subtitle { color: #586069; font-size: 18px; }
        
        .nav-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 16px;
            margin-top: 24px;
        }
        
        .nav-card {
            background: white;
            border: 1px solid #e1e4e8;
            border-radius: 6px;
            padding: 24px;
            text-decoration: none;
            color: inherit;
            transition: all 0.2s;
            box-shadow: 0 1px 0 rgba(27,31,35,0.04);
        }
        
        .nav-card:hover {
            border-color: #0366d6;
            transform: translateY(-2px);
            box-shadow: 0 3px 6px rgba(149, 157, 165, 0.15);
        }
        
        .nav-card h3 {
            color: #0366d6;
            font-size: 20px;
            margin-bottom: 8px;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        
        .nav-card p {
            color: #586069;
            font-size: 14px;
        }
        
        .badge {
            display: inline-block;
            padding: 2px 8px;
            font-size: 12px;
            font-weight: 500;
            line-height: 18px;
            border-radius: 10px;
            background-color: #ddf4ff;
            color: #0969da;
        }
        
        footer {
            margin-top: 48px;
            padding-top: 32px;
            border-top: 1px solid #e1e4e8;
            text-align: center;
            color: #6a737d;
            font-size: 12px;
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>👋 Maicy0609</h1>
            <p class="subtitle">GitHub Pages 项目集合</p>
        </header>

        <section>
            <h2 style="font-size: 24px; font-weight: 400; margin-bottom: 16px;">📁 可用资源</h2>
            <div class="nav-grid">
                <!-- ADOFAI 音乐转换器 -->
                <a href="./ADOFAI_Converter/" class="nav-card">
                    <h3>
                        <span>🎵</span>
                        ADOFAI Converter
                        <span class="badge">v1.2.2</span>
                    </h3>
                    <p>将 MIDI 或音频文件转换为冰与火之舞谱面，支持多种转换模式。</p>
                </a>
                
                <!-- 引用已存在的 Video_Backup 子页面 -->
                <a href="./Video_Backup/video_backup.html" class="nav-card">
                    <h3>
                        <span>📥</span>
                        Storm_Geeker_Backup 下载页
                        <span class="badge">视频备份</span>
                    </h3>
                    <p>视频资源备份与镜像下载页面，包含资源列表加载与多镜像源支持。</p>
                </a>
            </div>
        </section>

        <footer>
            <p>© 2026 Maicy0609 | Hosted on GitHub Pages</p>
            <p style="margin-top: 8px;">
                <a href="https://github.com/Maicy0609/maicy0609.github.io" style="color: #0366d6; text-decoration: none;">
                    🔗 查看源码仓库
                </a>
            </p>
        </footer>
    </div>
</body>
</html>
